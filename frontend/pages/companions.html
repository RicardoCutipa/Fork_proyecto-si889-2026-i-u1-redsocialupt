<!DOCTYPE html>
<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Compañeros - UPT Connect</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
            "primary": "#001256",
            "primary-container": "#1b2a6b",
            "surface": "#f3f4f6",
            "on-surface": "#1a1c1c",
            "on-surface-variant": "#454650",
            "outline": "#767681",
            "outline-variant": "#c6c5d2",
            "secondary-container": "#fed255",
            "error": "#ba1a1a"
        },
        "borderRadius": {
            "DEFAULT": "0.125rem", "lg": "0.5rem", "xl": "1rem", "full": "9999px"
        }
      },
    },
  }
</script>
<style>
    body { font-family: 'Inter', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1; }
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 12px 20px; border-radius: 8px; background: #1a1c1c; color: #fff; font-size: 14px; animation: slideIn .3s ease; }
    .toast.error { background: #ba1a1a; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
</style>
<script src="../js/components.js?v=6"></script>
</head>
<body class="bg-surface text-on-surface min-h-screen pt-16" style="font-family:'Inter',sans-serif;">
<app-header></app-header>
<div class="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-12 gap-6 py-6">
<!-- Left Column -->
<app-sidebar active-nav="companions"></app-sidebar>
<!-- Center Column -->
<main class="col-span-1 md:col-span-9 flex flex-col gap-6 w-full">
<div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
<div class="mb-6 flex flex-col md:flex-row md:items-end justify-between gap-6">
<div>
<h1 class="text-slate-900 mb-2 font-bold tracking-tight text-[28px]">Compañeros</h1>
<p class="text-slate-500 text-[16px]">Directorio de estudiantes y comunidad académica.</p>
</div>
<!-- Filters -->
<div class="flex flex-col sm:flex-row gap-4 w-full md:w-auto">
<div class="flex-1 sm:w-48">
<label class="block text-xs text-slate-500 mb-1 font-medium">Facultad</label>
<select id="filter-faculty" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-700 focus:border-[#1B2A6B] focus:ring-1 focus:ring-[#1B2A6B] outline-none" onchange="loadDirectory()">
<option value="">Todas las Facultades</option>
<option value="FAING">FAING</option>
<option value="FACEM">FACEM</option>
<option value="FAEDCOH">FAEDCOH</option>
<option value="FADE">FADE</option>
<option value="FACSA">FACSA</option>
<option value="FAU">FAU</option>
</select>
</div>
</div>
</div>
<!-- Grid -->
<div id="directory-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
<p class="text-slate-400 text-sm col-span-3 text-center py-8">Cargando compañeros...</p>
</div>
</div>
</main>
</div>

<script src="../js/api.js?v=6"></script>
<script>
requireAuth();
const user = getUser();


if(window.setupLayoutData) window.setupLayoutData(user);

const FACULTY_BADGE_COLORS = {
  'FAING': '#6B1B1B', 'FACEM': '#1B6B2A', 'FAEDCOH': '#1B2A6B',
  'FADE': '#1B8BC9', 'FACSA': '#6B1B6B', 'FAU': '#C96B1B'
};

async function loadDirectory() {
  const faculty = document.getElementById('filter-faculty').value;
  const params = faculty ? `faculty=${faculty}` : '';
  const result = await SocialAPI.getDirectory(params);
  const grid = document.getElementById('directory-grid');
  const users = getList(result);
  if (users.length === 0) {
    grid.innerHTML = '<p class="text-slate-400 text-sm col-span-3 text-center py-8">No se encontraron compañeros.</p>';
    return;
  }
  grid.innerHTML = users.map(u => {
    const color = getFacultyColor(u.school || '');
    const badgeColor = FACULTY_BADGE_COLORS[u.faculty] || color;
    const ini = initials(u.name);
    
    const avatarHtml = u.avatar_url
      ? `<div class="w-20 h-20 rounded-full mb-3 border-2 border-slate-100 bg-cover bg-center" style="background-image: url('${u.avatar_url}')"></div>`
      : `<div class="w-20 h-20 rounded-full flex items-center justify-center text-white font-bold text-2xl mb-3 border-2 border-slate-100" style="background:${color}">${ini}</div>`;
      
    return `
    <div class="bg-white rounded-xl border border-slate-200 p-5 flex flex-col items-center text-center hover:shadow-md transition-shadow relative">
      <div class="absolute top-3 right-3">
        <span class="inline-block px-2.5 py-0.5 rounded-full text-[10px] font-bold text-white" style="background:${badgeColor}">${u.faculty || 'UPT'}</span>
      </div>
      ${avatarHtml}
      <h3 class="font-bold text-[16px] leading-tight text-slate-900 mb-1">${u.name || 'Usuario'}</h3>
      <p class="text-[13px] text-slate-500 mb-4">${u.school || u.career || ''}</p>
      <button onclick="sendRequest(${u.id})" class="w-full py-1.5 px-4 rounded-lg border border-[#1B2A6B] text-[#1B2A6B] font-medium text-sm hover:bg-[#1B2A6B] hover:text-white transition-colors mt-auto">Ver Perfil</button>
    </div>`;
  }).join('');
}
loadDirectory();

async function sendRequest(userId) {
  const result = await SocialAPI.sendRequest(userId);
  if (result && result.ok) {
    showToast('Solicitud enviada');
  } else {
    showToast(result?.data?.error || 'Error al enviar solicitud', 'error');
  }
}
</script>
</body></html>
